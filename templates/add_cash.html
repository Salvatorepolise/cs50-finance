{% extends "layout.html" %}

{% block title %} — Add Cash{% endblock %}

{% block main %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <h2 class="mb-4">Add Cash</h2>
        <p class="text-muted">Deposit up to $50,000 at a time.</p>
        <form action="/add_cash" method="post">
            <div class="mb-3">
                <label class="form-label" for="amount">Amount (USD)</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input autofocus class="form-control" id="amount" min="0.01" max="50000" name="amount" placeholder="1000.00" step="0.01" type="number" required/>
                </div>
            </div>
            <button class="btn btn-primary w-100" type="submit">Add Funds</button>
        </form>
    </div>
</div>
{% endblock %}
