{% extends "layout.html" %}

{% block title %} — Register{% endblock %}

{% block main %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <h2 class="mb-4">Register</h2>
        <form action="/register" method="post">
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <input autocomplete="off" autofocus class="form-control" id="username" name="username" placeholder="Username" type="text" required/>
            </div>
            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" name="password" placeholder="Password" type="password" required/>
            </div>
            <div class="mb-3">
                <label class="form-label" for="confirmation">Confirm Password</label>
                <input class="form-control" id="confirmation" name="confirmation" placeholder="Confirm Password" type="password" required/>
            </div>
            <button class="btn btn-primary w-100" type="submit">Register</button>
        </form>
        <p class="mt-3 text-center text-muted small">Already have an account? <a href="/login">Log in</a></p>
    </div>
</div>
{% endblock %}
