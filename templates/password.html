{% extends "layout.html" %}

{% block title %} — Change Password{% endblock %}

{% block main %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <h2 class="mb-4">Change Password</h2>
        <form action="/password" method="post">
            <div class="mb-3">
                <label class="form-label" for="current">Current Password</label>
                <input autofocus class="form-control" id="current" name="current" type="password" required/>
            </div>
            <div class="mb-3">
                <label class="form-label" for="new_password">New Password</label>
                <input class="form-control" id="new_password" name="new_password" type="password" required/>
            </div>
            <div class="mb-3">
                <label class="form-label" for="confirmation">Confirm New Password</label>
                <input class="form-control" id="confirmation" name="confirmation" type="password" required/>
            </div>
            <button class="btn btn-warning w-100" type="submit">Change Password</button>
        </form>
    </div>
</div>
{% endblock %}
